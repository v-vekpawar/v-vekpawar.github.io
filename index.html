<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivek Pawar</title>
    <meta name="description" content="Vivek Pawar — AI & ML Developer. Interactive terminal-style portfolio showcasing skills, projects, and education.">

    <meta property="og:description" content="Building AI agents & automation systems with Python, Flask, and LLM APIs. B.Tech AI/ML @ GGSIPU.">

    <meta property="og:type" content="website">
    <meta property="og:image" content="https://v-vekpawar.github.io/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">
    <meta property="og:site_name" content="Vivek Pawar Portfolio">

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Vivek Pawar — AI Agent Developer">
    <meta name="twitter:description" content="Building AI agents & automation systems with Python, Flask, and LLM APIs.">
    <meta name="twitter:image" content="https://v-vekpawar.github.io/favicon_512.png">

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon_192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="favicon_512.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Bricolage+Grotesque:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Social Sidebar (Right) — Style D: Expand-on-Hover Dots -->
    <div class="social-sidebar" id="social-sidebar">
        <div class="sb-item">
            <span class="sb-label">email</span>
            <a href="mailto:contact.vivekpawar@gmail.com" class="sb-dot" target="_blank">
                <span class="icon-text">G</span>
            </a>
        </div>
        <div class="sb-item">
            <span class="sb-label">linkedin</span>
            <a href="https://www.linkedin.com/in/vivekpawar-ved" class="sb-dot" target="_blank">
                <span class="icon-text" style="text-transform: lowercase;">in</span>
            </a>
        </div>
        <div class="sb-item">
            <span class="sb-label">github</span>
            <a href="https://github.com/v-vekpawar" class="sb-dot" target="_blank">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
            </a>
        </div>
        <div class="sb-item">
            <span class="sb-label">resume</span>
            <a href="https://drive.google.com/file/d/1OMqFlYZFUcz9dL4GE0fdOuSZCuUfE2mP/view?usp=sharing" class="sb-dot" target="_blank">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            </a>
        </div>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
    </button>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Terminal Window -->
        <div class="terminal-window">
            <div class="terminal-titlebar">
                <div class="mac-dots">
                    <span class="dot dot-close"></span>
                    <span class="dot dot-minimize"></span>
                    <span class="dot dot-maximize"></span>
                </div>
                <div class="terminal-title">vivek@portfolio:~</div>
            </div>
            <div class="terminal-body" id="terminal-body">
                <!-- Terminal content rendered by JS -->
            </div>
        </div>

        <!-- Command Bar -->
        <div class="command-bar">
            <button class="cmd-btn active" data-cmd="cd me">
                <span class="cmd-icon">~</span> cd me
            </button>
            <button class="cmd-btn" data-cmd="cd skills">
                <span class="cmd-icon">&gt;&gt;</span> cd skills
            </button>
            <button class="cmd-btn" data-cmd="cd projects">
                <span class="cmd-icon">&lt;/&gt;</span> cd projects
            </button>
            <button class="cmd-btn" data-cmd="cd education">
                <span class="cmd-icon">::</span> cd education
            </button>
            <button class="cmd-btn" data-cmd="clear">
                <span class="cmd-icon">x</span> clear
            </button>
        </div>

        <!-- Footer -->
        <div class="footer">
            &copy; 2026 Vivek Pawar. Built with purpose.
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
